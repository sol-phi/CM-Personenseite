<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      data-namespace-typo3-fluid="true">

<f:layout name="Preview"/>

<f:section name="Header">
    <cb:link.editRecord uid="{data.uid}" table="{data.mainType}">
        <span style="background-color: #0d6efd; color: white; padding: 2px 6px; border-radius: 4px; font-size: 12px; margin-right: 8px;">Blaues Design</span>
        <strong>Lebenslauf:</strong> {data.vorname} {data.nachname}
    </cb:link.editRecord>
</f:section>

<f:section name="Content">
    <table style="width: 100%; font-size: 12px; margin-top: 10px; border-collapse: collapse;">
        <tr>
            <td style="padding: 4px 0; border-bottom: 1px solid #eee;"><strong>Ort:</strong></td>
            <td style="padding: 4px 0; border-bottom: 1px solid #eee;">{data.ort}</td>
        </tr>
        <tr>
            <td style="padding: 4px 0; border-bottom: 1px solid #eee;"><strong>Einträge:</strong></td>
            <td style="padding: 4px 0; border-bottom: 1px solid #eee;">
                Erfahrungen (<f:count subject="{data.erfahrungen}" />) |
                Bildung (<f:count subject="{data.bildung}" />)
            </td>
        </tr>
    </table>
</f:section>

</html>
